name: Deploy Handbook

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/handbook/**'
      - 'antora-playbook.yml'
      - 'scripts/build-handbook.sh'
      - 'kuml-docs/kuml-asciidoc/**'
      - 'kuml-cli/**'
      - '.github/workflows/docs.yml'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment; cancel in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Handbook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Antora needs the full history to resolve branch references
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Antora
        run: npm install -g @antora/cli@3 @antora/site-generator@3

      - name: Build kuml CLI (needed by the [kuml] pre-render step, V3.2.19)
        run: ./gradlew clean :kuml-cli:installDist

      - name: Pre-render [kuml] blocks + build Handbook
        run: scripts/build-handbook.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
