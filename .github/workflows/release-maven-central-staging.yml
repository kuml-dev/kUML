#
# Publish a staged deployment in the Sonatype Central Portal.
#
# Use case: the main `Release` workflow uploaded artefacts to the Central
# Portal but didn't auto-publish (because `automaticRelease = false` was
# in effect at the time, as it was through v0.3.0). Each module's
# deployment sits at status VALIDATED indefinitely until a maintainer
# clicks "Publish" in https://central.sonatype.com/publishing/deployments.
# This workflow does that click headlessly via the Central Portal REST
# API for a known deployment ID.
#
# Background: the Central Portal API has no list-deployments endpoint —
# only `POST /api/v1/publisher/deployment/{id}` to publish a known ID.
# Pending deployments are visible only via the web UI, so the maintainer
# must look up the ID(s) there. For multi-module Gradle projects this
# means N IDs per release (one per module).
#
# Trigger (one call per deployment):
#   gh workflow run release-maven-central-staging.yml \
#       -f deployment_id=11111111-2222-3333-4444-555555555555
#
# Going forward: `build.gradle.kts` now sets `automaticRelease = true`,
# so future releases publish automatically and this workflow should
# rarely be needed. Keep it for incident response.
#
# Web UI shortcut (when the workflow isn't worth the round-trip):
#   1. Open https://central.sonatype.com/publishing/deployments
#   2. Log in with SONATYPE_USERNAME / SONATYPE_PASSWORD
#   3. Click "Publish" on each VALIDATED row for the version in question.
#
name: Release Maven Central staging

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'Deployment UUID from https://central.sonatype.com/publishing/deployments'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish deployment ${{ inputs.deployment_id }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish via Central Portal API
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          DEPLOYMENT_ID: ${{ inputs.deployment_id }}
        run: |
          set -euo pipefail

          if [ -z "$SONATYPE_USERNAME" ] || [ -z "$SONATYPE_PASSWORD" ]; then
            echo "::error::SONATYPE_USERNAME or SONATYPE_PASSWORD secret is not set."
            exit 1
          fi

          # Validate the deployment ID shape — UUID-ish, no shell metacharacters.
          if ! echo "$DEPLOYMENT_ID" | grep -qE '^[A-Za-z0-9._-]+$'; then
            echo "::error::deployment_id contains characters outside [A-Za-z0-9._-]; refusing to forward."
            exit 1
          fi

          # Central Portal expects Bearer with the Base64-encoded "user:pass" payload.
          AUTH=$(printf '%s:%s' "$SONATYPE_USERNAME" "$SONATYPE_PASSWORD" | base64 | tr -d '\n')

          echo "Publishing deployment $DEPLOYMENT_ID…"
          PUBLISH_RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}\n" \
            -X POST "https://central.sonatype.com/api/v1/publisher/deployment/$DEPLOYMENT_ID" \
            -H "Authorization: Bearer $AUTH")
          STATUS=$(echo "$PUBLISH_RESPONSE" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          BODY=$(echo "$PUBLISH_RESPONSE" | sed '/^HTTP_STATUS:/d')

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
            echo "::error::Publish API returned HTTP $STATUS"
            echo "$BODY"
            exit 1
          fi

          {
            echo "### Maven Central publish"
            echo ""
            echo "| Field         | Value |"
            echo "| ------------- | ----- |"
            echo "| Deployment ID | \`$DEPLOYMENT_ID\` |"
            echo "| API status    | \`$STATUS\` |"
            echo ""
            echo "Artefacts will be searchable at https://search.maven.org/ within ~20 minutes"
            echo "and resolvable from https://repo1.maven.org/maven2/dev/kuml/ within a few hours."
            echo ""
            echo "If more deployments for the same release are still in VALIDATED state,"
            echo "trigger this workflow again with the next deployment ID."
          } >> "$GITHUB_STEP_SUMMARY"
