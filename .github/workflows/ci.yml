name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # OsSandboxTest's Linux suite (kuml-core-script) is a real behavioural
      # test, not a construction-only test — it launches bwrap and asserts
      # the cage actually blocks filesystem/network escapes. ubuntu-latest
      # does not ship bubblewrap by default.
      - name: Install bubblewrap (Linux OS sandbox test dependency)
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      # TEMPORARY diagnostic step (to be removed once the real root cause of
      # https://github.com/kuml-dev/kUML — OsSandboxTest Linux failures is
      # confirmed). Runs the bare bwrap invocation the tests rely on, with its
      # raw stderr unfiltered by any Kotlin exception wrapping, plus the two
      # kernel/AppArmor knobs most likely to explain a failure on a hardened
      # Ubuntu 24.04+ runner image (unprivileged user namespaces restricted by
      # default since Ubuntu 23.10/24.04).
      - name: Diagnose bwrap availability (TEMPORARY)
        run: |
          echo "--- bwrap version ---"
          bwrap --version || true
          echo "--- kernel.unprivileged_userns_clone ---"
          sysctl kernel.unprivileged_userns_clone || echo "(sysctl key not present on this kernel)"
          echo "--- apparmor bwrap profile status ---"
          sudo aa-status 2>/dev/null | grep -i bwrap || echo "(no bwrap AppArmor profile found / aa-status unavailable)"
          echo "--- direct bwrap smoke test ---"
          bwrap --unshare-all --die-with-parent --ro-bind / / -- echo "bwrap-smoke-ok" || echo "bwrap exited with code $?"

      - name: Build (excluding live LLM tests)
        run: ./gradlew build -DexcludeTags=live

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 7
