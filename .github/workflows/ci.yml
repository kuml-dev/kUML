name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # OsSandboxTest's Linux suite (kuml-core-script) is a real behavioural
      # test, not a construction-only test — it launches bwrap and asserts
      # the cage actually blocks filesystem/network escapes. ubuntu-latest
      # does not ship bubblewrap by default.
      - name: Install bubblewrap (Linux OS sandbox test dependency)
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Build (excluding live LLM tests)
        run: ./gradlew build -DexcludeTags=live

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 7
