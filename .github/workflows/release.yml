name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # required to create GitHub Releases & upload assets

jobs:
  release:
    name: Build, publish and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build everything
        run: ./gradlew build -DexcludeTags=live

      - name: Publish libraries to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache

      - name: Build CLI distribution zip
        run: ./gradlew :kuml-cli:distZip

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Compute SHA-256 of CLI zip
        id: sha
        run: |
          ZIP=$(ls kuml-cli/build/distributions/*.zip | head -n1)
          echo "zip=$ZIP" >> $GITHUB_OUTPUT
          echo "sha256=$(shasum -a 256 "$ZIP" | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sha.outputs.zip }}
          body_path: CHANGELOG_RELEASE.md
          generate_release_notes: false
          fail_on_unmatched_files: true

      - name: Print Homebrew formula update hint
        run: |
          echo "### Homebrew update"            >> $GITHUB_STEP_SUMMARY
          echo "Update Formula/kuml.rb:"        >> $GITHUB_STEP_SUMMARY
          echo "  url    = ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename ${{ steps.sha.outputs.zip }})" >> $GITHUB_STEP_SUMMARY
          echo "  sha256 = ${{ steps.sha.outputs.sha256 }}" >> $GITHUB_STEP_SUMMARY
