name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # required to create GitHub Releases & upload assets

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: build the platform-independent artefacts (Maven Central + dist
  # zip) and create the GitHub Release shell with the changelog. Runs once
  # on Linux because (a) JARs are platform-agnostic and (b) Maven Central
  # publish only needs to happen once per release.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build, publish JARs, create release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      release_url_base: ${{ steps.url_base.outputs.url }}
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # OsSandboxTest's Linux suite (kuml-core-script) is a real behavioural
      # test, not a construction-only test — it launches bwrap and asserts
      # the cage actually blocks filesystem/network escapes. ubuntu-latest
      # does not ship bubblewrap by default.
      - name: Install bubblewrap (Linux OS sandbox test dependency)
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Build everything
        run: ./gradlew build -DexcludeTags=live

      # Maven Central is immutable: a given GAV can only be published once.
      # If a prior run of this workflow already pushed the libraries, this
      # step would fail with "Component already exists". We probe
      # representative POMs before invoking Gradle so re-runs after a
      # downstream failure (e.g. GitHub Release creation) are idempotent.
      #
      # V3.2.7: kuml-core-dsl (and 4 sibling modules) are now Kotlin
      # Multiplatform. The root `kuml-core-dsl-${VERSION}.pom` (Gradle
      # metadata module) is still published under KMP, but it can land even
      # if a platform leg (`-js`/`-wasm-js`) failed validation, which would
      # make the root-only probe a false positive for "fully published".
      #
      # V3.2.15 follow-up: probing only the `-jvm` leg had the same failure
      # mode one level down — a partial publish where `-jvm` succeeds but
      # `-js` or `-wasm-js` fails Central's async validation would make a
      # retry see `already_published=true` and skip publishToMavenCentral
      # entirely, permanently orphaning the missing legs for that version
      # (Central is immutable, so only a version bump recovers). We now
      # probe all three legs of the representative module and only report
      # already_published=true if ALL of them are already live.
      - name: Check if libraries already on Maven Central
        id: mc_check
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ALL_PUBLISHED=true
          for LEG in jvm js wasm-js; do
            POM_URL="https://repo1.maven.org/maven2/dev/kuml/kuml-core-dsl-${LEG}/${VERSION}/kuml-core-dsl-${LEG}-${VERSION}.pom"
            HTTP_STATUS=$(curl -sI -o /dev/null -w "%{http_code}" "$POM_URL")
            echo "Maven Central probe ($LEG): $POM_URL → HTTP $HTTP_STATUS"
            if [ "$HTTP_STATUS" != "200" ]; then
              ALL_PUBLISHED=false
            fi
          done
          if [ "$ALL_PUBLISHED" = "true" ]; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "::notice::v${VERSION} already on Maven Central (jvm+js+wasm-js all present) — skipping publishToMavenCentral"
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
            echo "::notice::v${VERSION} not fully published yet (or partially published) — running publishToMavenCentral"
          fi

      - name: Publish libraries to Maven Central
        if: steps.mc_check.outputs.already_published != 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache

      - name: Build CLI distZip (needs system JDK at runtime)
        run: ./gradlew :kuml-cli:distZip

      - name: Locate distZip
        id: dist
        run: |
          DIST_ZIP=$(ls kuml-cli/build/distributions/kuml-*.zip | grep -v runtime | head -n1)
          echo "dist_zip=$DIST_ZIP" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Create or update GitHub Release (with distZip only — runtime zips added by matrix jobs)
        # gh CLI ships on all GitHub-hosted runners and uses GITHUB_TOKEN directly,
        # avoiding the "Requires authentication" finalize bug in softprops/action-gh-release@v2.
        # Idempotent across re-runs: if a release for this tag already exists
        # (e.g. a stale draft from a prior failed run, or a successful prior run
        # that we're re-running due to a downstream failure), we update notes
        # and upload the distZip with --clobber instead of failing.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists — updating notes + uploading distZip with --clobber"
            gh release edit "$TAG" --draft=false --notes-file CHANGELOG_RELEASE.md
            gh release upload "$TAG" "${{ steps.dist.outputs.dist_zip }}" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file CHANGELOG_RELEASE.md \
              "${{ steps.dist.outputs.dist_zip }}"
          fi

      - name: Strip leading 'v' from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Compute release URL base
        id: url_base
        run: |
          echo "url=${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: build the bundled jlink runtime on each target OS/arch. jlink
  # produces a JRE for the HOST platform, so we must run it on each
  # OS/arch we want to support. Each matrix leg uploads its runtime zip
  # to the release with a platform-suffixed name and emits the SHA-256 as
  # a job artefact for the dispatch job to consume.
  #
  # Targets:
  #   - macos-latest   + x64 JDK → darwin-x86_64  (Intel Macs, cross-built via
  #                                                Rosetta on Apple-Silicon
  #                                                runner; macos-13 was
  #                                                deprecated by GitHub in
  #                                                Nov 2025 and is no longer
  #                                                available on the free tier)
  #   - macos-latest             → darwin-arm64   (Apple Silicon)
  #   - ubuntu-latest            → linux-x86_64   (Linuxbrew + bare Linux installs)
  #   - windows-latest           → windows-x86_64 (WinGet + direct download)
  #   - ubuntu-24.04-arm         → linux-aarch64  (server hardware, SBCs, CI ARM64)
  #
  # NOTE on linux-aarch64: we use GitHub's native ARM64 hosted runner
  # (`ubuntu-24.04-arm`, GA since Jan 2025) instead of QEMU-emulated
  # cross-compile. QEMU via docker/setup-qemu-action only registers
  # binfmt_misc for Docker workloads, not for natively-launched processes
  # (setup-gradle invokes java directly, which then crashes with exit 255
  # on a foreign-arch JDK). Native runners are also ~10x faster than QEMU.
  # ─────────────────────────────────────────────────────────────────────────
  package-runtime:
    name: Package runtime (${{ matrix.target }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-x86_64
            jdk_arch: x64        # cross-build via Rosetta on Apple-Silicon runner
          - os: macos-latest
            target: darwin-arm64
            jdk_arch: aarch64
          - os: ubuntu-latest
            target: linux-x86_64
            jdk_arch: x64
          - os: windows-latest
            target: windows-x86_64
            jdk_arch: x64
          - os: ubuntu-24.04-arm
            target: linux-aarch64
            jdk_arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (${{ matrix.jdk_arch }})
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: ${{ matrix.jdk_arch }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # V3.2.27 — ephemeral Apple signing keychain (macOS legs only; the two
      # ubuntu-* and windows-* legs skip this because runner.os != 'macOS').
      # Gated on APPLE_CERTIFICATE_P12_BASE64 being non-empty so this workflow
      # still produces an unsigned runtime zip on any run where the Apple
      # secrets aren't available (mirrors the HAS_TOKEN/HAS_KEY idiom used
      # throughout this file, e.g. HOMEBREW_TAP_TOKEN / SDKMAN_CONSUMER_KEY /
      # CHOCOLATEY_API_KEY gating above).
      - name: Detect Apple signing secret presence
        if: runner.os == 'macOS'
        id: apple_gate
        env:
          HAS_SIGN: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' }}
        run: |
          echo "has_sign=$HAS_SIGN" >> $GITHUB_OUTPUT
          if [ "$HAS_SIGN" != "true" ]; then
            echo "::notice::APPLE_CERTIFICATE_P12_BASE64 not set — skipping Apple signing/notarization, runtime zip will be unsigned."
          fi

      - name: Set up Apple signing keychain
        if: runner.os == 'macOS' && steps.apple_gate.outputs.has_sign == 'true'
        env:
          P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PW: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KC_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/kuml-signing.keychain-db"
          security create-keychain -p "$KC_PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PW" "$KC"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$P12_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Mandatory CI fix against the interactive-prompt hang: without this,
          # codesign blocks on a headless keychain-access prompt that never
          # gets answered and the job times out.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PW" "$KC"
          # codesign/notarytool only look at keychains in the search list.
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Set up notarytool API key
        if: runner.os == 'macOS' && steps.apple_gate.outputs.has_sign == 'true'
        env:
          P8_B64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          echo "$P8_B64" | base64 --decode > "$RUNNER_TEMP/notary/AuthKey_${KEY_ID}.p8"

      - name: Build bundled jlink runtime zip
        # :kuml-cli:runtimeZip already depends on :kuml-mcp:installDist via the
        # bundledImage -> bundleMcpInstallDist task graph (V3.2.13), but we chain
        # it explicitly here too so CI logs show the kuml-mcp build step distinctly.
        #
        # runtimeZip itself depends on signBundledRuntime (kuml-cli/build.gradle.kts),
        # which signs every Mach-O in the bundled jlink runtime when
        # KUML_SIGN_IDENTITY is set and the host is macOS; it silently no-ops
        # otherwise (Linux/Windows legs, or macOS legs without the Apple secrets).
        #
        # `clean` is mandatory here (CLAUDE.md: always clean before any gradlew
        # invocation) — its absence is the confirmed root cause of v0.24.0/
        # v0.24.1/v0.24.2 shipping runtime/lib/libjli.dylib ad-hoc-signed: a
        # local/CI debug workflow with `clean` signed correctly every time,
        # this step without it did not. The likely mechanism is a stale
        # restored Gradle build-cache/up-to-date entry for an upstream task
        # (bundledImage/jlinkRuntime) from before signing existed or from a
        # differently-configured prior run, served instead of a fresh build —
        # `packageDmg`/`packageMsi` below already ran with `clean` and were
        # never affected.
        env:
          KUML_SIGN_IDENTITY: ${{ runner.os == 'macOS' && steps.apple_gate.outputs.has_sign == 'true' && secrets.APPLE_SIGN_IDENTITY || '' }}
          KUML_SIGN_KEYCHAIN: ${{ runner.os == 'macOS' && steps.apple_gate.outputs.has_sign == 'true' && format('{0}/kuml-signing.keychain-db', runner.temp) || '' }}
        run: ./gradlew clean :kuml-mcp:installDist :kuml-cli:runtimeZip

      - name: Notarize runtime zip
        # No --staple: a bare zip cannot be stapled (only .app/.pkg/.dmg can).
        # Gatekeeper does an online check against Apple's notary service
        # instead, the first time the unzipped binaries run — expected and
        # fine for a CLI tool distributed via Homebrew/SDKMAN/Chocolatey.
        if: runner.os == 'macOS' && steps.apple_gate.outputs.has_sign == 'true'
        env:
          KUML_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          # notarizeRuntimeZip depends on runtimeZip, which re-runs
          # signBundledRuntime (it declares no task outputs, so it's never
          # up-to-date) — pass the same keychain explicitly rather than
          # relying on the search-list mutation from the setup step earlier
          # in this job.
          KUML_SIGN_KEYCHAIN: ${{ format('{0}/kuml-signing.keychain-db', runner.temp) }}
          KUML_NOTARY_KEY_PATH: ${{ format('{0}/notary/AuthKey_{1}.p8', runner.temp, secrets.APPLE_API_KEY_ID) }}
          KUML_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          KUML_NOTARY_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: ./gradlew :kuml-cli:notarizeRuntimeZip

      - name: Clean up temporary Apple signing secrets
        if: runner.os == 'macOS' && steps.apple_gate.outputs.has_sign == 'true' && always()
        run: |
          rm -f "$RUNNER_TEMP/notary"/AuthKey_*.p8
          rm -f "$RUNNER_TEMP/cert.p12"
          # GitHub-hosted runners are ephemeral VMs destroyed after the job
          # regardless, but delete the imported private key explicitly too —
          # defense-in-depth in case this workflow is ever pointed at a
          # persistent (self-hosted) macOS runner.
          security delete-keychain "$RUNNER_TEMP/kuml-signing.keychain-db" || true

      - name: Rename runtime zip with target suffix and compute SHA-256
        id: pack
        shell: bash
        run: |
          ORIG=$(ls kuml-cli/build/distributions/kuml-runtime-*.zip | head -n1)
          VER='${{ needs.build.outputs.version }}'
          OUT="kuml-cli/build/distributions/kuml-runtime-${VER}-${{ matrix.target }}.zip"
          mv "$ORIG" "$OUT"
          # Portable SHA-256 across the three runner OSes:
          #   - Linux:   sha256sum (coreutils)
          #   - macOS:   shasum -a 256 (Perl-based, default install)
          #   - Windows: certutil -hashfile (Git Bash on windows-latest has
          #              neither sha256sum nor shasum reliably)
          if command -v sha256sum >/dev/null 2>&1; then
            SHA=$(sha256sum "$OUT" | cut -d ' ' -f1)
          elif command -v shasum >/dev/null 2>&1; then
            SHA=$(shasum -a 256 "$OUT" | cut -d ' ' -f1)
          else
            SHA=$(certutil -hashfile "$OUT" SHA256 | sed -n '2p' | tr -d '[:space:]')
          fi
          echo "zip=$OUT"   >> $GITHUB_OUTPUT
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "name=$(basename "$OUT")" >> $GITHUB_OUTPUT

      - name: Upload runtime zip to existing GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.pack.outputs.zip }}" --clobber

      - name: Stash sha+url for dispatch job
        shell: bash
        run: |
          mkdir -p sha-payload
          {
            echo "target=${{ matrix.target }}"
            echo "url=${{ needs.build.outputs.release_url_base }}/${{ steps.pack.outputs.name }}"
            echo "sha256=${{ steps.pack.outputs.sha256 }}"
          } > "sha-payload/${{ matrix.target }}.env"

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-sha-${{ matrix.target }}
          path: sha-payload/${{ matrix.target }}.env
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2b (V3.2.14): build the kuml-desktop macOS DMG and upload it to the
  # release, then dispatch a repository_dispatch event to the Homebrew tap
  # so its Cask (Cask/kuml-desktop.rb) can be rewritten with the new
  # version/url/sha256.
  #
  # Uses the plain (non-minified) `packageDmg` Compose-Desktop task rather
  # than `packageReleaseDmg` — the latter runs ProGuard, which currently
  # fails on this module (thousands of unresolved references from the
  # Kotlin scripting host + AI/Koog stack pulled in by kuml-desktop; not
  # something this cask-packaging job should silently paper over). The
  # bundled JRE inside `packageDmg`'s output is unminified but otherwise
  # fully functional — same trade-off `kuml-packaging:packageDmg` already
  # makes for the CLI DMG. Revisit once V3.2.14's ProGuard config is fixed
  # in a dedicated follow-up (see Stolperfalle notes in the daily note).
  #
  # DMG filename is `kuml-desktop-<macOsPackageVersion>.dmg`, where
  # macOsPackageVersion maps kUML's pre-1.0 "0.MINOR.PATCH" scheme to
  # jpackage's required "MINOR.PATCH.0" (see versionForJpackage() in
  # kuml-desktop/build.gradle.kts) — e.g. kUML 0.23.0 → kuml-desktop-23.0.0.dmg.
  # ─────────────────────────────────────────────────────────────────────────
  desktop-dmg:
    name: Package kuml-desktop DMG (macOS)
    needs: build
    runs-on: macos-latest
    outputs:
      dmg_name: ${{ steps.pack.outputs.name }}
      sha256: ${{ steps.pack.outputs.sha256 }}
      app_version: ${{ steps.pack.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # V3.2.27 — same ephemeral Apple signing keychain setup as package-runtime
      # (macOS legs). Gated on APPLE_CERTIFICATE_P12_BASE64 so this job still
      # produces an unsigned DMG (as it always has) if the Apple secrets are
      # ever unavailable — mirrors the HAS_TOKEN/HAS_KEY idiom used throughout
      # this file.
      - name: Detect Apple signing secret presence
        if: runner.os == 'macOS'
        id: apple_gate
        env:
          HAS_SIGN: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' }}
        run: |
          echo "has_sign=$HAS_SIGN" >> $GITHUB_OUTPUT
          if [ "$HAS_SIGN" != "true" ]; then
            echo "::notice::APPLE_CERTIFICATE_P12_BASE64 not set — skipping Apple signing/notarization, DMG will be unsigned."
          fi

      - name: Set up Apple signing keychain
        if: runner.os == 'macOS' && steps.apple_gate.outputs.has_sign == 'true'
        env:
          P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PW: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KC_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/kuml-signing.keychain-db"
          security create-keychain -p "$KC_PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PW" "$KC"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$P12_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Mandatory CI fix against the interactive-prompt hang: without this,
          # codesign blocks on a headless keychain-access prompt that never
          # gets answered and the job times out.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PW" "$KC"
          # codesign/notarytool only look at keychains in the search list.
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Set up notarytool API key
        if: runner.os == 'macOS' && steps.apple_gate.outputs.has_sign == 'true'
        env:
          P8_B64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          echo "$P8_B64" | base64 --decode > "$RUNNER_TEMP/notary/AuthKey_${KEY_ID}.p8"

      - name: Build kuml-desktop DMG
        # Compose's macOS signing DSL (kuml-desktop/build.gradle.kts, the
        # nativeDistributions.macOS.signing {} block) signs the app bundle
        # with a Developer ID + hardened runtime when KUML_SIGN_IDENTITY is
        # set; it silently no-ops otherwise (unsigned DMG, as before V3.2.27).
        # Notarization + stapling happen in a separate step below, since
        # Compose 1.11's notarization {} DSL can't express the API-key
        # credential flow used here (see the build.gradle.kts comment).
        env:
          KUML_SIGN_IDENTITY: ${{ steps.apple_gate.outputs.has_sign == 'true' && secrets.APPLE_SIGN_IDENTITY || '' }}
          KUML_SIGN_KEYCHAIN: ${{ steps.apple_gate.outputs.has_sign == 'true' && format('{0}/kuml-signing.keychain-db', runner.temp) || '' }}
        run: ./gradlew clean :kuml-desktop:packageDmg

      - name: Notarize and staple DMG
        if: steps.apple_gate.outputs.has_sign == 'true'
        env:
          KUML_NOTARY_KEY_PATH: ${{ format('{0}/notary/AuthKey_{1}.p8', runner.temp, secrets.APPLE_API_KEY_ID) }}
          KUML_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          KUML_NOTARY_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          DMG=$(ls kuml-desktop/build/compose/binaries/main/dmg/kuml-desktop-*.dmg | head -n1)
          kuml-packaging/scripts/notarize-and-staple.sh "$DMG" --staple

      - name: Clean up temporary Apple signing secrets
        if: runner.os == 'macOS' && steps.apple_gate.outputs.has_sign == 'true' && always()
        run: |
          rm -f "$RUNNER_TEMP/notary"/AuthKey_*.p8
          rm -f "$RUNNER_TEMP/cert.p12"
          # GitHub-hosted runners are ephemeral VMs destroyed after the job
          # regardless, but delete the imported private key explicitly too —
          # defense-in-depth in case this workflow is ever pointed at a
          # persistent (self-hosted) macOS runner.
          security delete-keychain "$RUNNER_TEMP/kuml-signing.keychain-db" || true

      - name: Rename DMG with version tag, upload, compute SHA-256
        id: pack
        shell: bash
        run: |
          VERSION='${{ needs.build.outputs.version }}'
          ORIG=$(ls kuml-desktop/build/compose/binaries/main/dmg/kuml-desktop-*.dmg | head -n1)
          APP_VERSION=$(basename "$ORIG" .dmg | sed 's/^kuml-desktop-//')
          OUT="kuml-desktop/build/compose/binaries/main/dmg/kuml-desktop-${VERSION}.dmg"
          cp "$ORIG" "$OUT"
          SHA=$(shasum -a 256 "$OUT" | cut -d ' ' -f1)
          echo "zip=$OUT" >> $GITHUB_OUTPUT
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "name=$(basename "$OUT")" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Upload DMG to existing GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.pack.outputs.zip }}" --clobber

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2c (V3.2.14): dispatch the kuml-desktop DMG url/sha256 to the
  # Homebrew tap so its Cask/kuml-desktop.rb gets rewritten. Independent of
  # dispatch-tap (the CLI Formula) — a Cask update failure must not block
  # the CLI Formula update or vice versa. Reuses HOMEBREW_TAP_TOKEN.
  # ─────────────────────────────────────────────────────────────────────────
  dispatch-tap-cask:
    name: Dispatch Homebrew Cask update (kuml-desktop)
    needs: [build, desktop-dmg]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.desktop-dmg.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        if: ${{ always() }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          HAS_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
          URL: ${{ needs.build.outputs.release_url_base }}/${{ needs.desktop-dmg.outputs.dmg_name }}
          SHA256: ${{ needs.desktop-dmg.outputs.sha256 }}
        run: |
          {
            echo "### Homebrew Cask update (kuml-desktop)"
            echo ""
            echo "| Field    | Value |"
            echo "| -------- | ----- |"
            echo "| Version  | \`$VERSION\` |"
            echo "| DMG URL  | \`$URL\` |"
            echo "| SHA-256  | \`$SHA256\` |"
            echo ""
            if [ "$HAS_TOKEN" = "true" ]; then
              echo "✅ Dispatching to \`kuml-dev/homebrew-kuml\` (event: \`kuml-desktop-release\`). See its Actions tab for the Cask bump."
            else
              echo "⚠ \`HOMEBREW_TAP_TOKEN\` is not set — auto-dispatch skipped. Trigger manually:"
              echo ""
              echo '```bash'
              echo "gh workflow run update-cask.yml -R kuml-dev/homebrew-kuml \\"
              echo "    -f version=$VERSION \\"
              echo "    -f url='$URL' \\"
              echo "    -f sha256='$SHA256'"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch Homebrew tap Cask update
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: kuml-dev/homebrew-kuml
          event-type: kuml-desktop-release
          client-payload: |-
            {
              "version": "${{ needs.build.outputs.version }}",
              "url":     "${{ needs.build.outputs.release_url_base }}/${{ needs.desktop-dmg.outputs.dmg_name }}",
              "sha256":  "${{ needs.desktop-dmg.outputs.sha256 }}"
            }

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: collect the per-platform SHAs from the matrix legs and dispatch
  # a single repository_dispatch event to the Homebrew tap so it can
  # rewrite the formula with platform-conditional url/sha blocks.
  # ─────────────────────────────────────────────────────────────────────────
  dispatch-tap:
    name: Dispatch Homebrew tap update
    needs: [build, package-runtime]
    # Run even if a `package-runtime` matrix leg failed, so we still
    # produce a useful summary with recovery instructions. Skip only on
    # explicit workflow cancellation. The dispatch step itself is gated
    # on `steps.payload.outputs.complete == 'true'` further down — a
    # partial set of platform artefacts NEVER produces a partial tap
    # update, because the Homebrew formula's `on_macos { on_intel/on_arm }`
    # + `on_linux` shape requires all three URLs to be coherent.
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: sha-artifacts
          pattern: runtime-sha-*
          merge-multiple: true

      - name: Assemble per-platform payload
        id: payload
        shell: bash
        run: |
          # Read each <target>.env, build a JSON object with one entry per
          # target. Unlike the previous version, missing targets are NOT a
          # hard error — we emit `complete=true/false` + a `missing=` list
          # so the downstream `if:` clauses and the Summary step can react.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, pathlib

          out = {}
          for p in sorted(pathlib.Path("sha-artifacts").glob("*.env")):
              kv = dict(line.strip().split("=", 1) for line in p.read_text().splitlines() if line.strip())
              out[kv["target"]] = {"url": kv["url"], "sha256": kv["sha256"]}

          # Homebrew formula requires exactly these three platforms (Intel Mac,
          # Apple Silicon, Linux x86_64). Windows and Linux ARM64 are SDKMAN!-
          # only and do not gate the Homebrew tap dispatch.
          required = {"darwin-x86_64", "darwin-arm64", "linux-x86_64"}
          missing = sorted(required - out.keys())
          complete = not missing

          print(f"complete={'true' if complete else 'false'}")
          print(f"missing={','.join(missing)}")
          # Always emit a `platforms` value so subsequent steps can
          # reference it without conditional indirection. When incomplete,
          # we still emit the partial map for the Summary step's debug
          # block, but `Dispatch` won't fire (gated on `complete`).
          print(f"platforms={json.dumps(out)}")
          PY

      - name: Summary
        # Always run so the workflow's Summary tab gets useful output even
        # if the matrix was incomplete. The summary tells maintainers
        # exactly what's missing and how to recover.
        if: ${{ always() }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          COMPLETE: ${{ steps.payload.outputs.complete }}
          MISSING: ${{ steps.payload.outputs.missing }}
          PLATFORMS: ${{ steps.payload.outputs.platforms }}
          HAS_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          {
            echo "### Homebrew update"
            echo ""
            echo "| Field    | Value |"
            echo "| -------- | ----- |"
            echo "| Version  | \`$VERSION\` |"
            echo "| Complete | \`$COMPLETE\` |"
            if [ "$COMPLETE" != "true" ]; then
              echo "| Missing  | \`$MISSING\` |"
            fi
            echo ""
            if [ "$COMPLETE" = "true" ] && [ "$HAS_TOKEN" = "true" ]; then
              echo "✅ All three Homebrew platform artefacts present (darwin-x86_64, darwin-arm64, linux-x86_64) — dispatching to \`kuml-dev/homebrew-kuml\`. See its Actions tab for the formula bump."
              echo ""
              echo "> Windows and Linux ARM64 are published to SDKMAN! only (not Homebrew)."
            elif [ "$COMPLETE" = "true" ] && [ "$HAS_TOKEN" != "true" ]; then
              echo "⚠ \`HOMEBREW_TAP_TOKEN\` is not set — auto-dispatch skipped. Trigger manually:"
              echo ""
              echo '```bash'
              echo "gh workflow run update-formula.yml -R kuml-dev/homebrew-kuml \\"
              echo "    -f version=$VERSION \\"
              echo "    -f platforms_json='$PLATFORMS'"
              echo '```'
            else
              echo "⛔ **Tap NOT updated.** Missing platform artefacts: \`$MISSING\`."
              echo ""
              echo "Common causes: a \`package-runtime\` matrix leg failed (deprecated runner, transient infra) or was cancelled."
              echo ""
              echo "**Recovery:**"
              echo ""
              echo "1. Re-run only the failed matrix leg from this workflow's run page (\"Re-run failed jobs\")."
              echo "2. Or trigger the tap manually once the missing assets are uploaded to the release:"
              echo ""
              echo '```bash'
              echo "# Compute SHA-256 for each runtime zip in the release first, then:"
              echo "gh workflow run update-formula.yml -R kuml-dev/homebrew-kuml \\"
              echo "    -f version=$VERSION \\"
              echo "    -f platforms_json='<JSON with url + sha256 per target>'"
              echo '```'
              echo ""
              echo "Or use the \`republish-runtime.yml\` workflow in this repo to rebuild one platform leg without re-running the whole release."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch Homebrew tap update
        if: steps.payload.outputs.complete == 'true' && env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: kuml-dev/homebrew-kuml
          event-type: kuml-release
          client-payload: |-
            {
              "version":   "${{ needs.build.outputs.version }}",
              "platforms": ${{ steps.payload.outputs.platforms }}
            }

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4 (V2.0.5): release each platform-specific runtime to SDKMAN!.
  #
  # SDKMAN! is the second-class distribution channel for kUML (Homebrew is
  # the first). Independent of `dispatch-tap` on purpose — Homebrew and
  # SDKMAN! issues should not cascade. Each leg consumes its own
  # `runtime-sha-<target>` artefact (uploaded by the `package-runtime`
  # matrix) and POSTs to https://vendors.sdkman.io via the official
  # SDKMAN! Release Action.
  #
  # Skips silently when `SDKMAN_CONSUMER_KEY` is not set — that's the
  # gating signal for "vendor onboarding not finished yet". The summary
  # step always runs and reports the state.
  #
  # See [[03 Bereiche/kUML/SDKMAN-Onboarding]] in the maintainer's vault
  # for the org-side onboarding checklist (GPG key, db-migrations PR,
  # credential email).
  # ─────────────────────────────────────────────────────────────────────────
  sdkman-release:
    name: SDKMAN! release (${{ matrix.target }})
    needs: [build, package-runtime]
    # Don't gate on `dispatch-tap` — Homebrew + SDKMAN! are independent.
    # Run on incomplete matrices so partial publishes still happen (each
    # leg is platform-specific anyway).
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            sdkman_platform: MAC_ARM64
          - target: darwin-x86_64
            sdkman_platform: MAC_OSX
          - target: linux-x86_64
            sdkman_platform: LINUX_64
          - target: windows-x86_64
            sdkman_platform: WINDOWS_64
          - target: linux-aarch64
            sdkman_platform: LINUX_ARM64
    steps:
      - name: Detect token presence
        id: gate
        env:
          HAS_KEY: ${{ secrets.SDKMAN_CONSUMER_KEY != '' }}
        run: |
          echo "has_token=$HAS_KEY" >> $GITHUB_OUTPUT
          if [ "$HAS_KEY" != "true" ]; then
            echo "::notice::SDKMAN_CONSUMER_KEY not set — skipping SDKMAN! release for ${{ matrix.target }} (vendor onboarding not finished)."
          fi

      - name: Download platform artefact
        if: steps.gate.outputs.has_token == 'true'
        uses: actions/download-artifact@v4
        with:
          name: runtime-sha-${{ matrix.target }}
          path: sha-payload

      - name: Read url + sha256 for this platform
        if: steps.gate.outputs.has_token == 'true'
        id: read
        shell: bash
        run: |
          ENV_FILE="sha-payload/${{ matrix.target }}.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "::error::Platform artefact for ${{ matrix.target }} missing — package-runtime leg likely failed. Skipping SDKMAN! publish for this platform."
            echo "available=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # shellcheck source=/dev/null
          source "$ENV_FILE"
          {
            echo "url=$url"
            echo "sha256=$sha256"
            echo "available=true"
          } >> $GITHUB_OUTPUT

      - name: Release ${{ matrix.target }} to SDKMAN!
        if: steps.gate.outputs.has_token == 'true' && steps.read.outputs.available == 'true'
        uses: sdkman/sdkman-release-action@v0.2.0
        with:
          consumer-key: ${{ secrets.SDKMAN_CONSUMER_KEY }}
          consumer-token: ${{ secrets.SDKMAN_CONSUMER_TOKEN }}
          candidate: kuml
          version: ${{ needs.build.outputs.version }}
          url: ${{ steps.read.outputs.url }}
          platform: ${{ matrix.sdkman_platform }}
          checksum-sha-256: ${{ steps.read.outputs.sha256 }}

      - name: Summary
        if: ${{ always() }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          TARGET: ${{ matrix.target }}
          SDKMAN_PLATFORM: ${{ matrix.sdkman_platform }}
          HAS_TOKEN: ${{ steps.gate.outputs.has_token }}
          ARTEFACT_AVAILABLE: ${{ steps.read.outputs.available }}
        run: |
          {
            echo "### SDKMAN! release — \`$TARGET\` ($SDKMAN_PLATFORM)"
            echo ""
            if [ "$HAS_TOKEN" != "true" ]; then
              echo "⏭  Skipped — \`SDKMAN_CONSUMER_KEY\` is not set."
              echo ""
              echo "Finish the vendor-onboarding checklist (see \`03 Bereiche/kUML/SDKMAN-Onboarding\` in the maintainer vault), set both secrets via \`gh secret set SDKMAN_CONSUMER_KEY\` and \`gh secret set SDKMAN_CONSUMER_TOKEN\`, then re-run this workflow."
            elif [ "$ARTEFACT_AVAILABLE" != "true" ]; then
              echo "⚠ Skipped — runtime artefact for \`$TARGET\` is missing. Check the \`package-runtime\` matrix leg."
            else
              echo "✅ Published kuml \`$VERSION\` for \`$SDKMAN_PLATFORM\` to SDKMAN!."
              echo ""
              echo "Verify with: \`sdk install kuml $VERSION\` on a $TARGET machine."
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5 (V2.0.5): set the just-released version as the SDKMAN! default
  # for kuml. Runs once after all matrix legs of `sdkman-release` succeeded.
  #
  # Only "promotes" the version — the platform-specific archives were
  # published by the matrix above; this call just flips the default-version
  # pointer so `sdk install kuml` (without a version) lands on this release.
  # ─────────────────────────────────────────────────────────────────────────
  sdkman-default:
    name: SDKMAN! default ← ${{ needs.build.outputs.version }}
    needs: [build, sdkman-release]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Detect token presence
        id: gate
        env:
          HAS_KEY: ${{ secrets.SDKMAN_CONSUMER_KEY != '' }}
        run: echo "has_token=$HAS_KEY" >> $GITHUB_OUTPUT

      - name: Promote to default
        if: steps.gate.outputs.has_token == 'true'
        uses: sdkman/sdkman-release-action@v0.2.0
        with:
          consumer-key: ${{ secrets.SDKMAN_CONSUMER_KEY }}
          consumer-token: ${{ secrets.SDKMAN_CONSUMER_TOKEN }}
          candidate: kuml
          version: ${{ needs.build.outputs.version }}
          operation: default

      - name: Summary
        if: ${{ always() }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          HAS_TOKEN: ${{ steps.gate.outputs.has_token }}
        run: |
          {
            echo "### SDKMAN! default version"
            echo ""
            if [ "$HAS_TOKEN" != "true" ]; then
              echo "⏭  Skipped — \`SDKMAN_CONSUMER_KEY\` not set."
            else
              echo "✅ kuml \`$VERSION\` is now the SDKMAN! default."
              echo ""
              echo "End-user effect: \`sdk install kuml\` (without a version) will install $VERSION."
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Job 6: publish the Windows runtime to the Chocolatey community repository.
  #
  # Chocolatey is the Windows counterpart to Homebrew/SDKMAN!. This job reuses
  # the already-built `windows-x86_64` runtime zip (uploaded to the GitHub
  # Release by `package-runtime`) and its pre-computed SHA-256 (stashed in the
  # `runtime-sha-windows-x86_64` artefact). The static package skeleton lives
  # in kuml-packaging/chocolatey/ — this job only injects the version + checksum,
  # packs the .nupkg and pushes it to https://push.chocolatey.org.
  #
  # Independent of the Homebrew/SDKMAN! jobs on purpose — a Chocolatey moderation
  # hiccup must not cascade into the other channels.
  #
  # Skips silently when `CHOCOLATEY_API_KEY` is not set. Runs on windows-latest
  # because choco.exe is Windows-only (pre-installed on GitHub's runner image).
  # ─────────────────────────────────────────────────────────────────────────
  publish-chocolatey:
    name: Chocolatey publish
    needs: [build, package-runtime]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Detect token presence
        id: gate
        shell: bash
        env:
          HAS_KEY: ${{ secrets.CHOCOLATEY_API_KEY != '' }}
        run: |
          echo "has_token=$HAS_KEY" >> $GITHUB_OUTPUT
          if [ "$HAS_KEY" != "true" ]; then
            echo "::notice::CHOCOLATEY_API_KEY not set — skipping Chocolatey publish."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.has_token == 'true'

      - name: Download windows-x86_64 sha payload
        if: steps.gate.outputs.has_token == 'true'
        uses: actions/download-artifact@v4
        with:
          name: runtime-sha-windows-x86_64
          path: sha-payload

      - name: Inject version + checksum into package
        if: steps.gate.outputs.has_token == 'true'
        id: tpl
        shell: bash
        run: |
          ENV_FILE="sha-payload/windows-x86_64.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "::error::windows-x86_64 runtime artefact missing — package-runtime leg likely failed. Skipping Chocolatey publish."
            echo "available=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # shellcheck source=/dev/null
          source "$ENV_FILE"   # provides: target, url, sha256
          VER='${{ needs.build.outputs.version }}'
          sed -i "s|__VERSION__|$VER|g" kuml-packaging/chocolatey/kuml.nuspec
          sed -i "s|__SHA256__|$sha256|g" kuml-packaging/chocolatey/tools/chocolateyInstall.ps1
          echo "available=true" >> $GITHUB_OUTPUT

      - name: Pack & push
        if: steps.gate.outputs.has_token == 'true' && steps.tpl.outputs.available == 'true'
        shell: pwsh
        working-directory: kuml-packaging/chocolatey
        env:
          CHOCO_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          choco pack kuml.nuspec
          choco push "kuml.${{ needs.build.outputs.version }}.nupkg" `
            --source "https://push.chocolatey.org/" `
            --api-key $env:CHOCO_KEY

      - name: Summary
        if: ${{ always() }}
        shell: bash
        env:
          VERSION: ${{ needs.build.outputs.version }}
          HAS_TOKEN: ${{ steps.gate.outputs.has_token }}
          AVAILABLE: ${{ steps.tpl.outputs.available }}
        run: |
          {
            echo "### Chocolatey publish"
            echo ""
            if [ "$HAS_TOKEN" != "true" ]; then
              echo "⏭  Skipped — \`CHOCOLATEY_API_KEY\` is not set."
              echo ""
              echo "Set it once with \`gh secret set CHOCOLATEY_API_KEY -R kuml-dev/kuml\` (paste the key from chocolatey.org → Account → API Keys), then re-run this workflow."
            elif [ "$AVAILABLE" != "true" ]; then
              echo "⚠ Skipped — the \`windows-x86_64\` runtime artefact is missing. Check the \`package-runtime\` matrix leg."
            else
              echo "✅ Pushed kuml \`$VERSION\` to the Chocolatey community repository."
              echo ""
              echo "New packages enter moderation (typically 1–3 days). Once approved: \`choco install kuml\`."
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Job 6b (v0.23.4): build the kuml-desktop Windows MSI and upload it to the
  # release. Windows counterpart of desktop-dmg (Job 2b) — same rationale for
  # using the plain `packageMsi` task instead of `packageReleaseMsi` (ProGuard
  # currently fails on this module, see the desktop-dmg comment above).
  #
  # MSI filename is `kuml-desktop-<version>.msi`, where <version> is kUML's
  # release tag version (matching the CLI runtimeZip naming convention) —
  # NOT the jpackage-mapped "MINOR.PATCH.0" app version baked into the MSI's
  # own ProductVersion (see versionForJpackage() in kuml-desktop/build.gradle.kts).
  # Both values are captured as job outputs since the Chocolatey package needs
  # the release-tag version for the download URL and app_version is kept for
  # parity with desktop-dmg / possible future diagnostics.
  # ─────────────────────────────────────────────────────────────────────────
  desktop-msi:
    name: Package kuml-desktop MSI (Windows)
    needs: build
    runs-on: windows-latest
    outputs:
      msi_name: ${{ steps.pack.outputs.name }}
      sha256: ${{ steps.pack.outputs.sha256 }}
      app_version: ${{ steps.pack.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build kuml-desktop MSI (unsigned)
        run: ./gradlew clean :kuml-desktop:packageMsi

      - name: Rename MSI with version tag, upload, compute SHA-256
        id: pack
        shell: bash
        run: |
          VERSION='${{ needs.build.outputs.version }}'
          ORIG=$(ls kuml-desktop/build/compose/binaries/main/msi/kuml-desktop-*.msi | head -n1)
          APP_VERSION=$(basename "$ORIG" .msi | sed 's/^kuml-desktop-//')
          OUT="kuml-desktop/build/compose/binaries/main/msi/kuml-desktop-${VERSION}.msi"
          cp "$ORIG" "$OUT"
          # windows-latest Git Bash has neither sha256sum nor shasum reliably —
          # same fallback cascade already proven in the package-runtime job.
          if command -v sha256sum >/dev/null 2>&1; then
            SHA=$(sha256sum "$OUT" | cut -d ' ' -f1)
          elif command -v shasum >/dev/null 2>&1; then
            SHA=$(shasum -a 256 "$OUT" | cut -d ' ' -f1)
          else
            SHA=$(certutil -hashfile "$OUT" SHA256 | sed -n '2p' | tr -d '[:space:]')
          fi
          echo "zip=$OUT" >> $GITHUB_OUTPUT
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "name=$(basename "$OUT")" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Upload MSI to existing GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.pack.outputs.zip }}" --clobber

  # ─────────────────────────────────────────────────────────────────────────
  # Job 6c (v0.23.4): publish the kuml-desktop MSI as its own `kuml-desktop`
  # Chocolatey package. A separate package ID from `kuml` (Job 6) — different
  # install mechanism entirely (Install-ChocolateyPackage against an MSI via
  # msiexec, not Install-ChocolateyZipPackage) and a different audience (GUI
  # app vs. CLI tool), so bundling them into one package would be misleading
  # both to `choco search` and to users who only want one of the two.
  #
  # Unlike publish-chocolatey (Job 6), no artifact download/stash dance is
  # needed here: desktop-msi (Job 6b) is a single job, not a matrix, so its
  # outputs are consumed directly via `needs.desktop-msi.outputs.*` — same
  # pattern dispatch-tap-cask (Job 2c) already uses against desktop-dmg.
  #
  # Reuses CHOCOLATEY_API_KEY (same Chocolatey account, two package IDs).
  # Independent of publish-chocolatey on purpose — a moderation hiccup on one
  # package must not block the other.
  # ─────────────────────────────────────────────────────────────────────────
  publish-chocolatey-desktop:
    name: Chocolatey publish (kuml-desktop)
    needs: [build, desktop-msi]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.desktop-msi.result == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Detect token presence
        id: gate
        shell: bash
        env:
          HAS_KEY: ${{ secrets.CHOCOLATEY_API_KEY != '' }}
        run: |
          echo "has_token=$HAS_KEY" >> $GITHUB_OUTPUT
          if [ "$HAS_KEY" != "true" ]; then
            echo "::notice::CHOCOLATEY_API_KEY not set — skipping kuml-desktop Chocolatey publish."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.has_token == 'true'

      - name: Inject version + checksum into package
        if: steps.gate.outputs.has_token == 'true'
        shell: bash
        env:
          VER: ${{ needs.build.outputs.version }}
          SHA256: ${{ needs.desktop-msi.outputs.sha256 }}
        run: |
          sed -i "s|__VERSION__|$VER|g" kuml-packaging/chocolatey-desktop/kuml-desktop.nuspec
          sed -i "s|__SHA256__|$SHA256|g" kuml-packaging/chocolatey-desktop/tools/chocolateyInstall.ps1

      - name: Pack & push
        if: steps.gate.outputs.has_token == 'true'
        shell: pwsh
        working-directory: kuml-packaging/chocolatey-desktop
        env:
          CHOCO_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          choco pack kuml-desktop.nuspec
          choco push "kuml-desktop.${{ needs.build.outputs.version }}.nupkg" `
            --source "https://push.chocolatey.org/" `
            --api-key $env:CHOCO_KEY

      - name: Summary
        if: ${{ always() }}
        shell: bash
        env:
          VERSION: ${{ needs.build.outputs.version }}
          HAS_TOKEN: ${{ steps.gate.outputs.has_token }}
        run: |
          {
            echo "### Chocolatey publish (kuml-desktop)"
            echo ""
            if [ "$HAS_TOKEN" != "true" ]; then
              echo "⏭  Skipped — \`CHOCOLATEY_API_KEY\` is not set."
            else
              echo "✅ Pushed kuml-desktop \`$VERSION\` to the Chocolatey community repository."
              echo ""
              echo "New packages enter moderation (typically 1–3 days). Once approved: \`choco install kuml-desktop\`."
              echo ""
              echo "⚠ Untested on real Windows: the uninstall script's \`-SoftwareName 'kuml-desktop*'\` registry"
              echo "lookup assumes jpackage's ProductName matches the Gradle \`packageName\`. Verify on the first"
              echo "real \`choco install kuml-desktop\` + \`choco uninstall kuml-desktop\` round-trip."
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Job 7: Publish IntelliJ plugin to JetBrains Marketplace.
  # Läuft bei jedem Tag-Push, gated auf KUML_PLUGIN_PUBLISH_TOKEN.
  # publishPlugin hängt intern von signPlugin → buildPlugin ab — ein einziger
  # Gradle-Aufruf reicht. Signing-Credentials kommen aus GitHub Secrets.
  # ─────────────────────────────────────────────────────────────────────────
  publish-jetbrains-plugin:
    name: Publish JetBrains plugin
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Detect token presence
        id: gate
        env:
          HAS_TOKEN: ${{ secrets.KUML_PLUGIN_PUBLISH_TOKEN != '' }}
        run: |
          echo "has_token=$HAS_TOKEN" >> $GITHUB_OUTPUT
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "::notice::KUML_PLUGIN_PUBLISH_TOKEN not set — skipping JetBrains Marketplace publish."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.has_token == 'true'

      - name: Set up JDK 21
        if: steps.gate.outputs.has_token == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.gate.outputs.has_token == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build, sign and publish plugin
        if: steps.gate.outputs.has_token == 'true'
        env:
          KUML_PLUGIN_CERTIFICATE_CHAIN: ${{ secrets.KUML_PLUGIN_CERTIFICATE_CHAIN }}
          KUML_PLUGIN_PRIVATE_KEY: ${{ secrets.KUML_PLUGIN_PRIVATE_KEY }}
          KUML_PLUGIN_PRIVATE_KEY_PASSWORD: ${{ secrets.KUML_PLUGIN_PRIVATE_KEY_PASSWORD }}
          KUML_PLUGIN_PUBLISH_TOKEN: ${{ secrets.KUML_PLUGIN_PUBLISH_TOKEN }}
        run: ./gradlew :kuml-jetbrains:kuml-jetbrains-plugin:publishPlugin

      - name: Summary
        if: ${{ always() }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          HAS_TOKEN: ${{ steps.gate.outputs.has_token }}
        run: |
          {
            echo "### JetBrains Marketplace publish"
            echo ""
            if [ "$HAS_TOKEN" != "true" ]; then
              echo "⏭  Skipped — \`KUML_PLUGIN_PUBLISH_TOKEN\` ist nicht gesetzt."
              echo ""
              echo "Token generieren unter https://plugins.jetbrains.com/author/me → Tokens, dann: \`gh secret set KUML_PLUGIN_PUBLISH_TOKEN -R kuml-dev/kuml\`"
            else
              echo "✅ kUML plugin \`$VERSION\` an JetBrains Marketplace übermittelt."
              echo ""
              echo "Review dauert ca. 3–4 Werktage. Status: https://plugins.jetbrains.com/plugin/dev.kuml.ide"
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Job 8: Publish the dev.kuml Gradle plugin to the Gradle Plugin Portal.
  # Läuft bei jedem Tag-Push, gated auf GRADLE_PUBLISH_KEY. Der Maven-Central-
  # Teil des Gradle-Plugins (Implementierungs-JAR + Marker-POM) braucht keinen
  # eigenen Job — er läuft automatisch im "Publish libraries to Maven Central"
  # Step von Job 1 mit, seit kuml-gradle-plugin aus nonPublishedModules
  # entfernt wurde.
  # ─────────────────────────────────────────────────────────────────────────
  publish-gradle-plugin:
    name: Publish Gradle plugin to Plugin Portal
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Detect token presence
        id: gate
        env:
          HAS_KEY: ${{ secrets.GRADLE_PUBLISH_KEY != '' }}
        run: |
          echo "has_token=$HAS_KEY" >> $GITHUB_OUTPUT
          if [ "$HAS_KEY" != "true" ]; then
            echo "::notice::GRADLE_PUBLISH_KEY not set — skipping Gradle Plugin Portal publish."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.has_token == 'true'

      - name: Set up JDK 21
        if: steps.gate.outputs.has_token == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.gate.outputs.has_token == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Gradle Plugin Portal
        if: steps.gate.outputs.has_token == 'true'
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew clean :kuml-gradle:kuml-gradle-plugin:publishPlugins

      - name: Summary
        if: ${{ always() }}
        env:
          VERSION: ${{ needs.build.outputs.version }}
          HAS_TOKEN: ${{ steps.gate.outputs.has_token }}
        run: |
          {
            echo "### Gradle Plugin Portal publish"
            echo ""
            if [ "$HAS_TOKEN" != "true" ]; then
              echo "⏭  Skipped — \`GRADLE_PUBLISH_KEY\`/\`GRADLE_PUBLISH_SECRET\` nicht gesetzt."
              echo ""
              echo "API-Key generieren unter https://plugins.gradle.org (Account → API Keys), dann:"
              echo '```bash'
              echo "gh secret set GRADLE_PUBLISH_KEY -R kuml-dev/kUML"
              echo "gh secret set GRADLE_PUBLISH_SECRET -R kuml-dev/kUML"
              echo '```'
            else
              echo "✅ kUML Gradle plugin \`dev.kuml\` \`$VERSION\` an den Gradle Plugin Portal übermittelt."
              echo ""
              echo "Sichtbar unter https://plugins.gradle.org/plugin/dev.kuml"
            fi
          } >> $GITHUB_STEP_SUMMARY
