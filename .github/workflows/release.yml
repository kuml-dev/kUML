name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # required to create GitHub Releases & upload assets

jobs:
  release:
    name: Build, publish and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build everything
        run: ./gradlew build -DexcludeTags=live

      - name: Publish libraries to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache

      - name: Build CLI distZip (needs system JDK at runtime)
        run: ./gradlew :kuml-cli:distZip

      - name: Build bundled jlink runtime zip (self-contained, no JDK needed)
        run: ./gradlew :kuml-cli:runtimeZip

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Compute SHA-256s for both zips
        id: sha
        run: |
          DIST_ZIP=$(ls kuml-cli/build/distributions/kuml-*.zip   | grep -v runtime | head -n1)
          RUNTIME_ZIP=$(ls kuml-cli/build/distributions/kuml-runtime-*.zip | head -n1)
          echo "dist_zip=$DIST_ZIP"           >> $GITHUB_OUTPUT
          echo "runtime_zip=$RUNTIME_ZIP"     >> $GITHUB_OUTPUT
          echo "dist_sha256=$(shasum -a 256 "$DIST_ZIP"    | cut -d ' ' -f1)" >> $GITHUB_OUTPUT
          echo "runtime_sha256=$(shasum -a 256 "$RUNTIME_ZIP" | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with both zips
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sha.outputs.dist_zip }}
            ${{ steps.sha.outputs.runtime_zip }}
          body_path: CHANGELOG_RELEASE.md
          generate_release_notes: false
          fail_on_unmatched_files: true

      - name: Compute runtime-zip URL (Homebrew uses the self-contained bundle)
        id: url
        run: |
          ZIP_NAME=$(basename "${{ steps.sha.outputs.runtime_zip }}")
          echo "url=${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Strip leading 'v' from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Dispatch Homebrew tap update
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: kuml-dev/homebrew-kuml
          event-type: kuml-release
          client-payload: |-
            {
              "version": "${{ steps.ver.outputs.version }}",
              "url":     "${{ steps.url.outputs.url }}",
              "sha256":  "${{ steps.sha.outputs.runtime_sha256 }}"
            }

      - name: Print Homebrew formula update hint
        run: |
          echo "### Homebrew update" >> $GITHUB_STEP_SUMMARY
          echo "version = ${{ steps.ver.outputs.version }}"   >> $GITHUB_STEP_SUMMARY
          echo "url     = ${{ steps.url.outputs.url }}"       >> $GITHUB_STEP_SUMMARY
          echo "sha256  = ${{ steps.sha.outputs.runtime_sha256 }}" >> $GITHUB_STEP_SUMMARY
          if [ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]; then
            echo "_HOMEBREW_TAP_TOKEN not set — formula not auto-updated. Edit Formula/kuml.rb in kuml-dev/homebrew-kuml manually._" >> $GITHUB_STEP_SUMMARY
          else
            echo "_Dispatched to kuml-dev/homebrew-kuml — see its Actions tab for the formula bump._" >> $GITHUB_STEP_SUMMARY
          fi
