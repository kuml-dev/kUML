name: "Code Quality: CodeQL Analysis"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    # Weekly scan on Mondays at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # Manual build mode — we control the build command below.
          # Avoids CodeQL's autobuild which crashes the Kotlin daemon
          # under its constrained memory environment.
          build-mode: manual

      - name: Build for CodeQL
        # Disable the Kotlin daemon and run compilation in-process to avoid
        # the "Daemon compilation failed" crash seen with CodeQL's autobuild.
        # Only compile classes (no tests, no packaging) — CodeQL needs bytecode,
        # not test results.
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.daemon=false
            -Dkotlin.compiler.execution.strategy=in-process
            -Xmx3g
        run: |
          ./gradlew classes \
            -Dorg.gradle.daemon=false \
            -Dkotlin.compiler.execution.strategy=in-process \
            --no-daemon \
            --no-build-cache \
            --parallel \
            -DexcludeTags=live \
            -x test \
            -x ktlintCheck

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
