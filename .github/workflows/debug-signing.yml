name: Debug Signing (temporary)

# TEMPORARY diagnostic workflow (2026-07-05) — investigating why
# signBundledRuntime signs 43/44 Mach-O files on real GitHub Actions
# macOS runners instead of the 44/44 a local build signs, shipping
# runtime/lib/libjli.dylib still ad-hoc in v0.24.0 and v0.24.1. Manual
# dispatch only — never runs automatically, never tags/publishes/touches
# Homebrew, Maven Central, or the GitHub Releases page. Delete this file
# once the root cause is found and fixed.

on:
  workflow_dispatch:

jobs:
  debug:
    name: Debug signBundledRuntime on macos-latest
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect Apple signing secret presence
        id: apple_gate
        env:
          HAS_SIGN: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' }}
        run: echo "has_sign=$HAS_SIGN" >> $GITHUB_OUTPUT

      - name: Set up Apple signing keychain
        if: steps.apple_gate.outputs.has_sign == 'true'
        env:
          P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PW: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KC_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/kuml-signing.keychain-db"
          security create-keychain -p "$KC_PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PW" "$KC"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$P12_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PW" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Pre-build environment diagnostics
        run: |
          echo "--- uname ---"
          uname -a
          echo "--- sw_vers ---"
          sw_vers
          echo "--- file version ---"
          file --version || true
          echo "--- java version ---"
          java -version
          echo "--- disk info (looking for network/synthetic filesystems) ---"
          diskutil info / | grep -E "Type|Protocol|File System" || true
          mount | head -5

      - name: Build bundled jlink runtime zip (diagnostic)
        env:
          KUML_SIGN_IDENTITY: ${{ steps.apple_gate.outputs.has_sign == 'true' && secrets.APPLE_SIGN_IDENTITY || '' }}
          KUML_SIGN_KEYCHAIN: ${{ steps.apple_gate.outputs.has_sign == 'true' && format('{0}/kuml-signing.keychain-db', runner.temp) || '' }}
        run: ./gradlew clean :kuml-mcp:installDist :kuml-cli:runtimeZip --info 2>&1 | tee "$RUNNER_TEMP/build.log"

      - name: Check zip AFTER FIRST invocation (before notarize step)
        run: |
          ZIP=$(find kuml-cli/build/distributions -iname "kuml-runtime-*.zip" | head -1)
          EXTRACT_DIR="$RUNNER_TEMP/zip-check-1"
          mkdir -p "$EXTRACT_DIR"
          ZIP_ENTRY=$(unzip -Z1 "$ZIP" | grep "runtime/lib/libjli.dylib$" | head -1)
          unzip -oq "$ZIP" "$ZIP_ENTRY" -d "$EXTRACT_DIR"
          echo "=== libjli.dylib in zip AFTER 1st invocation ==="
          codesign -dv "$EXTRACT_DIR/$ZIP_ENTRY" 2>&1

      # Exactly mirrors release.yml's "Notarize runtime zip" step (same env
      # vars, same command) — this is a SEPARATE ./gradlew invocation, just
      # like the real release pipeline, to test whether that specific
      # two-invocation pattern is what reintroduces the ad-hoc signature.
      - name: Notarize runtime zip (mirrors release.yml exactly)
        if: steps.apple_gate.outputs.has_sign == 'true'
        env:
          KUML_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          KUML_SIGN_KEYCHAIN: ${{ format('{0}/kuml-signing.keychain-db', runner.temp) }}
          KUML_NOTARY_KEY_PATH: ${{ format('{0}/notary/AuthKey_{1}.p8', runner.temp, secrets.APPLE_API_KEY_ID) }}
          KUML_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          KUML_NOTARY_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: ./gradlew :kuml-cli:notarizeRuntimeZip --info 2>&1 | tee "$RUNNER_TEMP/build2.log"

      - name: Check zip AFTER SECOND invocation (after notarize step)
        if: always()
        run: |
          ZIP=$(find kuml-cli/build/distributions -iname "kuml-runtime-*.zip" | head -1)
          ls -la "$ZIP"
          EXTRACT_DIR="$RUNNER_TEMP/zip-check-2"
          mkdir -p "$EXTRACT_DIR"
          ZIP_ENTRY=$(unzip -Z1 "$ZIP" | grep "runtime/lib/libjli.dylib$" | head -1)
          unzip -oq "$ZIP" "$ZIP_ENTRY" -d "$EXTRACT_DIR"
          echo "=== libjli.dylib in zip AFTER 2nd invocation (notarize step) ==="
          codesign -dv "$EXTRACT_DIR/$ZIP_ENTRY" 2>&1
          echo "=== signBundledRuntime lines from the SECOND build's log ==="
          grep -i "signBundledRuntime\|isMachO\|libjli\|libjvm\|critical-file\|UP-TO-DATE.*bundledImage\|Task :kuml-cli:bundledImage\|Task :kuml-cli:runtimeZip" "$RUNNER_TEMP/build2.log" | head -40

      - name: Post-build filesystem diagnostics
        if: always()
        run: |
          IMG="kuml-cli/build/image/kuml"
          echo "--- full listing of runtime/lib ---"
          find "$IMG/runtime/lib" -maxdepth 2 -exec ls -la {} \; 2>&1 || echo "runtime/lib missing entirely"
          echo "--- libjli.dylib specifically (LOOSE FILE on disk, pre-zip) ---"
          find "$IMG/runtime" -iname "libjli*" -exec ls -la {} \; -exec file {} \; -exec codesign -dv {} \; 2>&1 || echo "libjli.dylib not found anywhere"
          echo "--- libjvm.dylib specifically (LOOSE FILE on disk, pre-zip) ---"
          find "$IMG/runtime" -iname "libjvm*" -exec ls -la {} \; -exec file {} \; -exec codesign -dv {} \; 2>&1 || echo "libjvm.dylib not found anywhere"
          echo "--- grep signBundledRuntime lines from build.log ---"
          grep -i "signBundledRuntime\|isMachO\|libjli\|libjvm\|critical-file" "$RUNNER_TEMP/build.log" || echo "no matching lines found"

      - name: Inspect the actual produced zip (not just the loose files)
        if: always()
        run: |
          ZIP=$(find kuml-cli/build/distributions -iname "kuml-runtime-*.zip" | head -1)
          echo "--- zip file: $ZIP ---"
          ls -la "$ZIP" 2>&1 || echo "zip not found"
          echo "--- zip listing (looking for libjli/libjvm entries) ---"
          unzip -l "$ZIP" 2>&1 | grep -iE "libjli|libjvm" || echo "no matching entries in zip listing"
          echo "--- extracting libjli.dylib FROM THE ZIP and checking its signature ---"
          EXTRACT_DIR="$RUNNER_TEMP/zip-extract-check"
          mkdir -p "$EXTRACT_DIR"
          ZIP_ENTRY=$(unzip -Z1 "$ZIP" | grep "runtime/lib/libjli.dylib$" | head -1)
          echo "zip entry path: $ZIP_ENTRY"
          if [ -n "$ZIP_ENTRY" ]; then
            unzip -oq "$ZIP" "$ZIP_ENTRY" -d "$EXTRACT_DIR"
            EXTRACTED="$EXTRACT_DIR/$ZIP_ENTRY"
            ls -la "$EXTRACTED"
            file "$EXTRACTED"
            echo "--- codesign on the file AS IT EXISTS INSIDE THE ZIP ---"
            codesign -dv "$EXTRACTED" 2>&1
          else
            echo "libjli.dylib entry not found in zip listing at all"
          fi

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-log
          path: ${{ runner.temp }}/build.log
          retention-days: 3

      - name: Clean up signing keychain
        if: always() && steps.apple_gate.outputs.has_sign == 'true'
        run: security delete-keychain "$RUNNER_TEMP/kuml-signing.keychain-db" || true
