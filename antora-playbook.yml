#
# Antora playbook — direct, un-rendered preview of docs/handbook.
#
# This file lives in the repository root so `url: .` resolves cleanly to the
# git repo Antora needs. Earlier attempts with the playbook nested under
# docs/handbook hit Antora path-resolution quirks (two failed pipeline runs).
#
# `[source,kuml]` blocks and `kuml::path[]` macros are shown here as plain,
# un-rendered AsciiDoc source (Antora runs on Asciidoctor.js/Node and cannot
# load the JVM `kuml-asciidoc` Asciidoctor extension directly — see
# docs/handbook/modules/tooling/pages/asciidoc.adoc). That's intentionally
# lossless for a quick source preview.
#
# For a build with **live-rendered diagrams** (V3.2.19), use
# scripts/build-handbook.sh instead — it pre-renders every kUML block to SVG
# via the `kuml asciidoc` CLI subcommand *before* invoking Antora, and is
# what .github/workflows/docs.yml uses for the deployed site at
# https://docs.kuml.dev.
#
# Un-rendered local preview:
#   npx antora generate antora-playbook.yml
#   open build/site/index.html
#
# Rendered local preview (recommended):
#   ./gradlew clean :kuml-cli:installDist
#   scripts/build-handbook.sh --open
#
site:
  title: kUML Handbook
  url: https://docs.kuml.dev
  start_page: kuml::index.adoc

content:
  sources:
    - url: .
      branches: HEAD
      start_path: docs/handbook

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true

output:
  dir: ./build/site

asciidoc:
  attributes:
    page-toclevels: 3
    source-highlighter: highlight.js
