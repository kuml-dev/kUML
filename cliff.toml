# cliff.toml — git-cliff configuration for kUML
#
# Generates CHANGELOG.md from Conventional-Commit messages.
# Quick start:
#   git-cliff --output CHANGELOG.md         # full history
#   git-cliff --latest --output RELEASE.md  # current tag only

[changelog]
header = """
# Changelog

All notable changes to this project are documented here. Format follows
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and adheres to
[Semantic Versioning](https://semver.org/).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first | trim }}{% if commit.scope %} ({{ commit.scope }}){% endif %}\
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat",      group = "Features"      },
  { message = "^fix",       group = "Bug Fixes"     },
  { message = "^docs",      group = "Documentation" },
  { message = "^refactor",  group = "Refactor"      },
  { message = "^test",      group = "Tests"         },
  { message = "^chore",     group = "Chore"         },
  { message = "^build",     group = "Build"         },
  { message = "^ci",        group = "CI"            },
  { message = "^perf",      group = "Performance"   },
  { message = ".*",         group = "Other"         },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "oldest"
