#
# Antora playbook — used for both local preview and GitHub Pages deployment.
#
# Local preview:
#   npx antora generate docs/handbook/antora-playbook.yml
#   open docs/handbook/build/site/index.html
#
# CI deployment: .github/workflows/docs.yml builds this and pushes to gh-pages.
# The live site is served at https://docs.kuml.dev
#
site:
  title: kUML Handbook
  url: https://docs.kuml.dev
  start_page: kuml::index.adoc

content:
  sources:
    - url: ../..
      branches: HEAD
      start_path: docs/handbook

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true

output:
  dir: ./build/site

asciidoc:
  # extensions:
  #   The kuml-asciidoc extension lives on Maven Central as a Java/Asciidoctor
  #   extension — it cannot be loaded by Antora (Node.js based) directly.
  #   Until a Node.js bridge or a pre-render Gradle task feeds rendered SVGs
  #   into the handbook, kUML listings are shown as plain Kotlin script source.
  #   That is intentionally lossless: every example is a valid `.kuml.kts`
  #   script and remains fully readable.
  attributes:
    page-toclevels: 3
    source-highlighter: highlight.js
